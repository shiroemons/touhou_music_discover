version: "0.5"

processes:
  redis:
    command: redis-server --daemonize no --port 6379
    availability:
      restart: on_failure
    readiness_probe:
      exec:
        command: redis-cli ping
      initial_delay_seconds: 1
      period_seconds: 2
      failure_threshold: 3
  rails:
    command: rm -f tmp/pids/server.pid && bin/rails server -b 0.0.0.0
    availability:
      restart: on_failure
    depends_on:
      postgresql:
        condition: process_healthy
      redis:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: localhost
        scheme: http
        path: "/up"
        port: 3000
      initial_delay_seconds: 5
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
  js:
    command: yarn build --watch=forever
    availability:
      restart: on_failure
  css:
    command: yarn build:css --watch
    availability:
      restart: on_failure
